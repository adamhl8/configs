[changelog]
body = """
{% macro print_commit(commit) -%}
  - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
    {% if commit.breaking %}[**breaking**] {% endif %}\
    {{ commit.message | trim }}\
    {% if commit.remote.username %} by @{{ commit.remote.username }}{%- endif -%}\
    {% if commit.remote.pr_number %} in \
    [#{{ commit.remote.pr_number }}]({{ self::remote_url() }}/pull/{{ commit.remote.pr_number }}){%- endif %} \
    ([{{ commit.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ commit.id }}))\
{% endmacro -%}

{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{% if version %}\
  {% if previous.version %}\
    ## [{{ version | trim_start_matches(pat="v") }}]\
       ({{ self::remote_url() }}/compare/{{ previous.version }}..{{ version }}) - {{ timestamp | date(format="%Y-%m-%d") }}
  {% else %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
  {% endif %}\
{% else %}\
  ## [unreleased]
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
  ### {{ group | striptags | trim | upper_first }}
  {% for commit in commits %}
    {{ self::print_commit(commit=commit) }}
  {% endfor %}
{%- endfor -%}
"""

[git]
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->🚀 Features" },
  { message = "^improve", group = "<!-- 1 -->✨ Improvements" },
  { message = "^perf", group = "<!-- 2 -->⚡ Performance" },
  { message = "^fix", group = "<!-- 3 -->🐛 Bug Fixes" },
  { message = "^refactor", group = "<!-- 4 -->🚜 Refactor" },
  { message = "^chore|^ci", group = "<!-- 5 -->⚙️ Miscellaneous Tasks" },
  { message = "^docs", group = "<!-- 6 -->📚 Documentation" },
  { message = "^revert", group = "<!-- 7 -->◀️ Revert" },
  { message = "^release", skip = true },
]

commit_preprocessors = [{ pattern = '\((\w+\s)?#([0-9]+)\)', replace = "" }]

filter_commits = true
sort_commits = "newest"

[bump]
custom_minor_increment_regex = "^improve"
