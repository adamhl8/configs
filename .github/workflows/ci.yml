name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up nub
        uses: nubjs/setup-nub@v0
        with:
          node-version: "26"

      - name: Install lefthook
        run: |
          nub add -g lefthook
          nub bin -g >> "$GITHUB_PATH"

      - name: Install
        run: nub i --frozen-lockfile

      - name: Build + lint
        run: nub run bundle

      - name: Lint last commit message
        if: github.event_name == 'push'
        run: nubx commitlint --last --verbose

      - name: Lint PR commit messages
        if: github.event_name == 'pull_request'
        run: nubx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
