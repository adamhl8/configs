name: Release

on:
  workflow_dispatch: {}
  workflow_call:
    inputs:
      setup:
        description: Shell commands to run before the release
        type: string
        required: false
        default: ""
      docker-image:
        description: ghcr.io image name to build and push after the release
        type: string
        required: false
        default: ""
    secrets:
      CI_SIGNING_KEY:
        required: true
      CI_TOKEN:
        required: false
      NPM_CI_TOKEN:
        required: false
      GH_TOKEN:
        required: false

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Install lefthook
        run: |
          bun add -g lefthook
          bun pm bin -g >> "$GITHUB_PATH"

      - name: Setup
        if: inputs.setup != ''
        run: ${{ inputs.setup }}

      - name: Install
        run: bun install

      # release-it's preflight checks (npm ping/whoami) use the npm CLI, which reads ~/.npmrc
      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_CI_TOKEN}" > ~/.npmrc
        env:
          NPM_CI_TOKEN: ${{ secrets.NPM_CI_TOKEN }}

      - name: Configure git identity and signing
        run: |
          git config user.name "Adam Langbert"
          git config user.email "adamhl@pm.me"
          mkdir -p ~/.ssh
          printf '%s\n' "$CI_SIGNING_KEY" > ~/.ssh/signing_key
          chmod 600 ~/.ssh/signing_key
          git config gpg.format ssh
          git config user.signingkey '~/.ssh/signing_key'
          git config commit.gpgsign true
          git config tag.gpgsign true
        env:
          CI_SIGNING_KEY: ${{ secrets.CI_SIGNING_KEY }}

      - name: Release
        run: just release-run
        env:
          CI_TOKEN: ${{ secrets.CI_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_CI_TOKEN }}
          LEFTHOOK: "0"

  docker:
    needs: release
    if: inputs.docker-image != ''
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Check out release tag
        run: git checkout "$(git describe --tags --abbrev=0)"

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          secrets: |
            GH_TOKEN=${{ secrets.GH_TOKEN }}
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ inputs.docker-image }}:latest
