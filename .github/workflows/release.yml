name: Release

on:
  workflow_dispatch: {}
  workflow_call:
    inputs:
      setup:
        description: Shell commands to run before the release, for repos whose build needs system deps
        type: string
        required: false
        default: ""
    secrets:
      NPM_CI_TOKEN:
        required: false
      CI_SIGNING_KEY:
        required: true

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Install lefthook
        run: |
          bun add -g lefthook
          bun pm bin -g >> "$GITHUB_PATH"

      - name: Setup
        if: inputs.setup != ''
        run: ${{ inputs.setup }}

      - name: Install
        run: bun install

      # release-it's preflight checks (npm ping/whoami) use the npm CLI, which reads ~/.npmrc
      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_CI_TOKEN}" > ~/.npmrc
        env:
          NPM_CI_TOKEN: ${{ secrets.NPM_CI_TOKEN }}

      - name: Configure git identity and signing
        run: |
          git config user.name "Adam Langbert"
          git config user.email "adamhl@pm.me"
          mkdir -p ~/.ssh
          printf '%s\n' "$CI_SIGNING_KEY" > ~/.ssh/signing_key
          chmod 600 ~/.ssh/signing_key
          git config gpg.format ssh
          git config user.signingkey '~/.ssh/signing_key'
          git config commit.gpgsign true
          git config tag.gpgsign true
        env:
          CI_SIGNING_KEY: ${{ secrets.CI_SIGNING_KEY }}

      - name: Release
        run: just release-run
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # bun publish doesn't read ~/.npmrc, it takes the token from NPM_CONFIG_TOKEN
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_CI_TOKEN }}
          LEFTHOOK: "0"
